# @schema
# type: object
# description: Gateway resource configuration for observability plane routing
# @schema
gateway:
  # @schema
  # type: boolean
  # description: Enable Gateway CR creation
  # default: true
  # @schema
  enabled: true

  # @schema
  # type: object
  # additionalProperties: true
  # description: |
  #   Gateway infrastructure configuration passed to the generated Service.
  #   Used to configure cloud provider load balancer settings via annotations.
  #   Example for AWS with Elastic IP:
  #     infrastructure:
  #       annotations:
  #         service.beta.kubernetes.io/aws-load-balancer-type: "external"
  # @schema
  infrastructure: {}

  # @schema
  # type: object
  # description: Annotations added to the Gateway resource. Use this to configure cert-manager, external-dns, or other integrations.
  # additionalProperties:
  #   type: string
  # default: {}
  # @schema
  annotations: {}

  # @schema
  # type: integer
  # description: HTTP listener port
  # default: 80
  # @schema
  httpPort: 80

  # @schema
  # type: integer
  # description: HTTPS listener port
  # default: 443
  # @schema
  httpsPort: 443

  # @schema
  # type: object
  # description: TLS configuration for the HTTPS listener
  # @schema
  tls:
    # @schema
    # type: boolean
    # description: Enable HTTPS listener on the gateway. When false, only the HTTP listener is created.
    # default: true
    # @schema
    enabled: true

    # @schema
    # type: string
    # description: Hostname pattern for the HTTPS listener (SNI matching)
    # default: "*.openchoreo.invalid"
    # @schema
    hostname: "*.openchoreo.invalid"

    # @schema
    # type: array
    # description: TLS certificate references for the HTTPS listener. Each entry references a Secret containing the TLS cert/key pair.
    # items:
    #   type: object
    #   properties:
    #     name:
    #       type: string
    #       description: Secret name containing the TLS certificate
    # @schema
    certificateRefs: []

  # @schema
  # type: object
  # description: TLS passthrough configuration for OpenSearch direct access
  # @schema
  tlsPassthrough:
    # @schema
    # type: boolean
    # description: Enable TLS passthrough listener (used for OpenSearch direct access)
    # default: false
    # @schema
    enabled: false

    # @schema
    # type: string
    # description: Hostname for TLS passthrough listener
    # default: ""
    # @schema
    hostname: ""

    # @schema
    # type: integer
    # description: Port for TLS passthrough listener
    # default: 11443
    # @schema
    port: 11443


# @schema
# type: object
# description: Common security configuration shared across all components
# @schema
security:
  # @schema
