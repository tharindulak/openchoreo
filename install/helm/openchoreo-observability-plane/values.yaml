# @schema
# type: object
# description: AI-powered Root Cause Analysis agent configuration
# @schema
rca:
  # @schema
  # type: boolean
  # description: Enable RCA agent deployment
  # default: false
  # @schema
  enabled: true

  # @schema
  # type: string
  # description: Name of the RCA agent deployment
  # default: sre-agent
  # @schema
  name: sre-agent

  # @schema
  # type: integer
  # description: Number of RCA agent replicas
  # minimum: 0
  # default: 1
  # @schema
  replicas: 1

  # @schema
  # type: string
  # description: Log level for the RCA agent
  # default: INFO
  # @schema
  logLevel: "INFO"

  # @schema
  # type: boolean
  # description: Enable remediation agent
  # default: true
  # @schema
  remedAgent: true

  # @schema
  # type: object
  # description: CORS configuration for the RCA agent
  # @schema
  cors:
    # @schema
    # type: array
    # description: List of allowed origins for CORS requests. Empty list disables CORS.
    # items:
    #   type: string
    # @schema
    allowedOrigins:
    - "http://openchoreo.localhost:8080"

  # @schema
  # type: object
  # description: Container image configuration
  # @schema
  image:
    # @schema
    # type: string
    # description: Container image repository
    # default: ghcr.io/openchoreo/sre-agent
    # @schema
    repository: ghcr.io/openchoreo/sre-agent
    # @schema
    # type: string
    # description: Container image tag (defaults to Chart.AppVersion if empty)
    # default: ""
    # @schema
    tag: ""
    # @schema
    # description: Image pull policy
    # enum: [Always, IfNotPresent, Never]
    # default: IfNotPresent
    # @schema
    pullPolicy: IfNotPresent

  # @schema
  # type: object
  # description: Kubernetes service configuration
  # @schema
  service:
    # @schema
    # description: Service type
    # enum: [ClusterIP, NodePort, LoadBalancer]
    # default: ClusterIP
    # @schema
    type: ClusterIP
    # @schema
    # type: integer
    # description: Service port
    # minimum: 1
    # maximum: 65535
    # default: 8080
    # @schema
    port: 8080

  # @schema
  # type: object
  # description: Resource requests and limits
  # @schema
  resources:
    # @schema
    # type: object
    # description: Minimum resources guaranteed
    # @schema
    requests:
      # @schema
      # type: string
      # description: CPU request
      # default: 100m
      # @schema
      cpu: 100m
      # @schema
      # type: string
      # description: Memory request
      # default: 1024Mi
      # @schema
      memory: 1024Mi
    # @schema
    # type: object
    # description: Maximum resources
    # @schema
    limits:
      # @schema
      # type: string
      # description: CPU limit
      # default: 250m
      # @schema
      cpu: 250m
      # @schema
      # type: string
      # description: Memory limit
      # default: 1536Mi
      # @schema
      memory: 1536Mi

  # @schema
  # type: string
  # description: Observer API base URL
  # default: "http://observer:8080"
  # @schema
  observerApiUrl: "http://observer:8080"

  # @schema
  # type: string
  # description: OpenChoreo API base URL used by rca-agent
  # default: "http://api.openchoreo.localhost:8080"
  # @schema
  openchoreoApiUrl: "http://api.openchoreo.localhost:8080"

  # @schema
  # type: string
  # description: Name of an existing Secret injected via envFrom into the RCA agent container. Required keys - RCA_LLM_API_KEY, OAUTH_CLIENT_SECRET. Optional keys - SQL_BACKEND_URI (when reportBackend is postgresql).
  # default: rca-agent-secret
  # @schema
  secretName: "rca-agent-secret"

  # @schema
  # type: object
  # description: LLM configuration for AI-powered analysis
  # @schema
  llm:
    # @schema
    # type: string
    # description: LLM model name (e.g., gpt-5.2)
    # default: ""
    # @schema
    modelName: "anthropic:claude-sonnet-4-6"


  # @schema
  # description: Report storage backend type
  # enum: [sqlite, postgresql]
  # default: sqlite
  # @schema
  reportBackend: "sqlite"

  # @schema
  # type: string
  # description: PVC storage size for SQLite (only used when reportBackend is sqlite)
  # default: 128Mi
  # @schema
  sqliteStorageSize: 128Mi

  # @schema
  # type: object
  # description: OAuth2 client credentials configuration for RCA agent authentication
  # @schema
  oauth:
    # @schema
    # type: string
    # description: OAuth2 client ID registered with the IDP
    # default: openchoreo-rca-agent
    # @schema
    clientId: "openchoreo-rca-agent"
    # @schema
    # type: string
    # description: Optional OAuth2 scope to request in the client credentials token request
    # default: ""
    # @schema
    scope: ""

  # @schema
  # type: object
  # description: Authorization configuration for RCA agent
  # @schema
  authz:
    # @schema
    # type: integer
    # description: Authorization request timeout in seconds
    # default: 30
    # @schema
    timeoutSeconds: 30

  # @schema
  # type: object
  # description: HTTPRoute configuration for the RCA agent
  # @schema
  http:
    # @schema
    # type: boolean
    # description: Enable HTTPRoute
    # default: true
    # @schema
    enabled: true
    # @schema
    # type: array
    # description: HTTPRoute hostnames
    # items:
    #   type: string
    # @schema
    hostnames: []

  # @schema
  # type: array
  # description: Extra environment variables for the RCA agent container
  # items:
  #   type: object
  #   properties:
  #     name:
  #       type: string
  #       description: Environment variable name
  #     value:
  #       type: string
  #       description: Environment variable value
  # @schema
  extraEnvs: []

